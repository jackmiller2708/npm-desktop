<ng-container *ngIf="appDeps.size || devDeps.size">
  <div class="flex justify-between pb-1 border-b">
    <h1 class="text-3xl font-medium">{{ name }}</h1>
    <app-button content="Close project" (onClick)="onClosePrjBtnClick()"></app-button>
  </div>

  <div class="flex gap-2 flex-1 min-h-0 px-2">
    <app-container-resizable className="border-r-2 min-w-max" [maxPercentage]="70">
      <overlay-scrollbars class="h-full w-full pr-5" [defer]="true">
        <app-display-package *ngIf="appDeps.size" [dataSource]="appDeps" name="Dependencies"></app-display-package>
        <app-display-package *ngIf="devDeps.size" [dataSource]="devDeps" name="Dev Dependencies"></app-display-package>
      </overlay-scrollbars>
    </app-container-resizable>
    <div class="flex-1">
      <app-details-package></app-details-package>
    </div>
  </div>
</ng-container>
