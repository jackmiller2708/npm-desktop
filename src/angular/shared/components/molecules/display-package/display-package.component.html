<ng-container *ngIf="dataSource">
  <div class="sticky top-0 bg-white w-full text-xl font-medium flex gap-1" *ngIf="name">
    <span>{{ name }}</span>
    <span>({{ packageCount }})</span>
  </div>
  <div class="flex flex-col px-2 ml-1 border-l">
    <app-item-package *ngFor="let item of dataSource" [dataSource]="item[1]"></app-item-package>
  </div>
</ng-container>
