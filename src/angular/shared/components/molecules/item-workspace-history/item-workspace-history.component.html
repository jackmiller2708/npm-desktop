<div *ngIf="dataSource" class="flex justify-between border border-black rounded-md py-1 px-2">
  <div>
    <ng-container *ngIf="!isEditing; else nameInput">
      <app-text [content]="dataSource.name" type="paragraph" className="font-semibold text-lg cursor-pointer" (onClick)="onSelectedTriggered()"></app-text>
    </ng-container>
    <ng-template #nameInput>
      <input #inputEl className="font-semibold text-lg select-text" (keydown)="onInputKeyDown($event)" [value]="dataSource.name"/>
    </ng-template>

    <app-text [content]="dataSource.path" type="paragraph" className="text-sm"></app-text>
  </div>
  <div class="pt-1">
    <span class="cursor-pointer" (click)="onDropdownBtnClick()" #dropdownTrigger>
      <app-icon path="M8 256a56 56 0 1 1 112 0A56 56 0 1 1 8 256zm160 0a56 56 0 1 1 112 0 56 56 0 1 1 -112 0zm216-56a56 56 0 1 1 0 112 56 56 0 1 1 0-112z"></app-icon>
    </span>
  </div>
  <app-menu-dropdown [dataSource]="menuItems" [target]="dropdownTrigger" [(shown)]="isMenuShown"></app-menu-dropdown>
</div>
