<div *ngIf="dataSource; else noPackage">
  {{ dataSource.name }}
</div>

<ng-template #noPackage>
  <div class="flex items-center justify-center h-full w-full select-none">
    <p class="text-4xl text-center font-bold text-slate-400 opacity-30">Select a package to view details</p>
  </div>
</ng-template>
